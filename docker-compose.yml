services:
  backend:
    image: maulpdocker/weather-station:backend
    container_name: weather-station-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./weather-station-backend-service/.env

  frontend:
    image: maulpdocker/weather-station:frontend
    container_name: weather-station-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
